#---
# Single-Cell RNA-seq Analysis Configuration File
# APECED JAK Inhibition Study
# =================================================
##quarto::quarto_render("v5_comprehensive_scRNAseq_report.qmd", execute_params = list(config_file = "config5.yaml"))
# INPUT/OUTPUT
# ------------
input:
  rds_file: "./PBMC_RDS/object_final_annotated.rds"

output:
  root_dir: "./PBMC_report_outputs"


  use_cached_results: true  # Skip heavy computation if results exist

# METADATA COLUMNS
# ----------------
metadata:
  assay: "RNA"
  cluster_fine: "Monaco_fine"      # Fine-grained cell type annotation
  cluster_broad: "Monaco_main"      # Broad lineage annotation
  #cluster_fine: "PanGI_L3"      # Fine-grained cell type annotation
  #cluster_broad: "PanGI_L2"      # Broad lineage annotation

 
  subject_col: "Subject_fixed"   # Subject identifier for pairing
  treatment_col: "Treatment"     # Treatment status column
  
# ANALYSIS GROUPS
# ---------------
groups:
  treatment: "Treated"
  reference: "Untreated"

qc:
  mt_pct_max: 65
  nfeature_min: 200
  nfeature_max: 6000
  ncount_min: 500
  ncount_max: 50000

analysis:
  fdr_cutoff: 0.05
  logfc_cutoff: 0.0
  n_permutations: 10000
  min_cells_per_cluster: 10

enrichment:
  databases: ["GO:BP", "REACTOME"]

advanced:
  normalization_method: "LogNormalize"
  scaling_method: "SCTransform"
  parallel_cores: 8
  random_seed: 42

report:
  include_qc_section: true
  include_composition_section: true
  include_deg_section: true
  include_gsea_section: true
  include_marker_section: true

visualization:
  heatmap_cluster_rows: true
  heatmap_cluster_cols: true
  volcano_label_top_n: 10
  color_palettes:
    direction: ["#4DBBD5", "#E64B35"]

markers:
  tcell: ["CD3D", "CD3E", "CD8A", "CD4"]
  bcell: ["CD19", "MS4A1", "CD79A"]
  myeloid: ["CD14", "FCGR3A", "CD68"]
  nk: ["NCAM1", "NKG7", "GNLY"]
  epithelial: ["EPCAM", "KRT8", "KRT18", "CDH1"]
  endothelial: ["PECAM1", "VWF", "CDH5"]

